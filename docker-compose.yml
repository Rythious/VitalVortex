# Vital Vortex — one Compose stack, same shape as TheChoreDrawer.
# Caddy already routes vitalvortex.duckdns.org -> localhost:8082, so this
# publishes the container's 8080 to 127.0.0.1:8082 and needs no Caddy changes.
services:
  vitalvortex:
    image: rythious/vitalvortex:latest
    build: .
    restart: unless-stopped
    environment:
      # Shared invite code for self-serve sign-up. Set it in a .env file next to
      # this compose file (VV_INVITE_CODE=...); leave unset to disable sign-up.
      - VV_INVITE_CODE=${VV_INVITE_CODE:-}
      # USDA FoodData Central API key for the food-database search. Set in .env
      # (VV_FDC_API_KEY=...); leave unset to disable search and hide its UI.
      - VV_FDC_API_KEY=${VV_FDC_API_KEY:-}
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      # SQLite database file
      - vitalvortex-data:/data
      # Flask session secret — persisted so redeploys don't log everyone out.
      # (Analog of ChoreDrawer's Data Protection keys volume — don't skip it.)
      - vitalvortex-keys:/keys

volumes:
  vitalvortex-data:
  vitalvortex-keys:
